model:
  era5_channels: 70
  global_img_size: [168, 280]
  global_patch_size: 8
  global_embed_dim: 768
  global_depth: 8
  global_num_heads: 12
  local_channels: 5
  local_img_size: [512, 512]
  local_patch_size: 16
  local_embed_dim: 512
  local_depth: 6
  local_num_heads: 8
  cross_num_heads: 8
  cross_layers: 2
  decoder_depth: 2
  out_channels: 1
  mlp_ratio: 4.0
  drop_rate: 0.1
  drop_path: 0.1
  global_region_h: 7
  global_region_w: 7

data:
  era5_dir: /path/to/era5_daily
  ghap_dir: /path/to/ghap_pm25_daily
  elev_coarse_path: /path/to/elevation_coarse.zarr
  elev_hires_path: /path/to/gmted2010.zarr
  cams_dir: /path/to/cams_europe
  eea_zarr_path: /path/to/eea_stations.zarr
  train_years: [2017, 2018, 2019, 2020]
  val_years: [2021]
  test_years: [2022]
  horizons: [1, 2, 3, 4]
  patch_size: 512
  normalize: true
  num_workers: 4
  ghap_mean: 15.0
  ghap_std: 20.0
  augment: true
  hotspot_ratio: 0.5
  hotspot_power: 1.0

train:
  batch_size: 2
  val_batch_size: 2
  learning_rate: 5.0e-5
  warmup_epochs: 5
  weight_decay: 0.05
  min_lr: 1.0e-6
  epochs: 300
  alpha_mse: 1.0
  alpha_ssim: 0.0
  alpha_grad: 0.0
  alpha_spectral: 0.1
  alpha_station: 0.1
  underestimate_penalty: 1.0
  gradient_clip_val: 1.0
  early_stopping_patience: 100
  precision: "bf16-mixed"
  accumulate_grad_batches: 1
  log_every_n_steps: 5
  check_val_every_n_epoch: 1
  save_top_k: 3
